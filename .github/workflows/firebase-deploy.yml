jobs:
  test_connection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Firebase Admin
        run: npm install firebase-admin
      - name: Run Test
        env:
          # This assumes you have exported the service account JSON to this env var
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node test-firestore.js
